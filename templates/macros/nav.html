{% macro site_nav(current_path="") %}
<nav class="site-nav" aria-label="Main navigation">
  <a class="brand-link instant" href="{{ get_url(path='/') }}" aria-label="{{ config.title }} - Home">
    <img src="{{ get_url(path='img/melfware-logo.svg') }}" alt="" class="brand-mark">
    <span>{{ config.title }}</span>
  </a>
  <div class="nav-links">
    {% for item in config.extra.sections %}
      {% if item.is_external %}
      <a href="{{ item.path }}" target="_blank" rel="noreferrer noopener">{{ item.name }}</a>
      {% else %}
      {% set item_path = item.path ~ "/" %}
      <a class="instant {% if current_path == item.path or current_path is starting_with(item_path) %}active{% endif %}" href="{{ get_url(path=item.path) }}">{{ item.name }}</a>
      {% endif %}
    {% endfor %}
  </div>
</nav>
{% endmacro site_nav %}
