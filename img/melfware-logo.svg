<svg viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Melfware</title>
  <desc id="logoDesc">Clean technical Melfware wordmark with an automation signal line.</desc>
  <defs>
    <linearGradient id="wordGradient" x1="48" y1="58" x2="650" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="signalGradient" x1="54" y1="138" x2="650" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
