<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Melflin Family Loader</title>
  <style>html,body{margin:0;padding:0;background:#fff;height:100%;width:100%}iframe{border:0;width:100%;height:100%}</style>
</head>
<body>
  <iframe id="frame" title="Melflin Family"></iframe>
  <script>
    (async () => {
      const bust = Date.now();
      const res = await fetch('./version.json?v=' + bust, { cache: 'no-store' });
      const data = await res.json();
      document.getElementById('frame').src = './family-' + data.version + '.html?v=' + bust;
    })().catch(() => {
      document.getElementById('frame').src = './family-20260401-162855.html?v=' + Date.now();
    });
  </script>
</body>
</html>
