<svg viewBox="0 0 300 76" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">MelfWare</title>
  <desc id="logoDesc">MelfWare - intelligent automation</desc>

  <defs>
    <linearGradient id="mw-word" x1="0" y1="0" x2="300" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f7dff"/>
      <stop offset="0.52" stop-color="#00b7ff"/>
      <stop offset="1" stop-color="#4df0d2"/>
    </linearGradient>
    <linearGradient id="mw-node" x1="20" y1="16" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#4df0d2"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#mw-node)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 40H50" stroke-width="3.5"/>
    <path d="M34 25V55" stroke-width="3.5"/>
    <path d="M50 40L66 28" stroke-width="3.5"/>
    <path d="M50 40L66 52" stroke-width="3.5"/>
  </g>
  <g fill="url(#mw-node)">
    <circle cx="19" cy="40" r="6"/>
    <circle cx="34" cy="25" r="5"/>
    <circle cx="34" cy="55" r="5"/>
    <circle cx="66" cy="28" r="5.5"/>
    <circle cx="66" cy="52" r="5.5"/>
  </g>

  <text x="86" y="41"
        font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="34"
        font-weight="760"
        letter-spacing="-0.6"
        fill="url(#mw-word)">MelfWare</text>

  <text x="88" y="61"
        font-family="Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="9.5"
        font-weight="650"
