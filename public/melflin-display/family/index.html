<!doctype html>
<html lang='de'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Melflin Family</title>
  <style>
    body { margin: 0; background: #fff; color: #111; font-family: Arial, Helvetica, sans-serif; }
    .page { position: relative; width: 800px; height: 480px; margin: 0 auto; box-sizing: border-box; padding: 20px 24px 18px; display: grid; grid-template-rows: auto 1fr; gap: 12px; background: #fff; overflow: hidden; }
    .header { border-bottom: 3px solid #111; padding-bottom: 10px; }
    .title { font-size: 34px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
    .subtitle { margin-top: 6px; font-size: 15px; font-weight: 700; color: #444; }
    .content { display: grid; grid-template-columns: 1fr 1fr 0.9fr; gap: 16px; min-height: 0; }
    .group { border-top: 3px solid #111; padding-top: 8px; overflow: hidden; }
    .group h2 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; }
    .item { border: 2px solid #111; border-radius: 12px; padding: 8px 10px; margin-bottom: 8px; }
    .item-meta { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; font-weight: 800; color: #444; margin-bottom: 4px; }
    .item-title { font-size: 17px; line-height: 1.12; font-weight: 800; }
    .item-location { margin-top: 4px; font-size: 12px; line-height: 1.2; color: #444; font-weight: 700; }
    .empty { font-size: 14px; color: #555; font-weight: 700; }
    .update { position: absolute; right: 24px; bottom: 16px; font-size: 11px; color: #444; font-weight: 800; }
  </style>
</head>
<body>
  <div class='page'>
    <div class='header'>
      <div class='title'>Familienansicht</div>
      <div class='subtitle'>Samstag, 25.04.2026</div>
    </div>
    <div class='content'>
      <div class='group'><h2>Heute</h2><div class='empty'>Nichts Relevantes</div></div>
      <div class='group'><h2>Morgen</h2>
        <div class='item'>
          <div class='item-meta'>
            <div class='item-when'>So 26.04. 20:00</div>
            <div class='item-who'>Unklar</div>
          </div>
          <div class='item-title'>Türli duschen</div>
          
        </div>
        </div>
      <div class='group'><h2>Demnächst</h2>
        <div class='item'>
          <div class='item-meta'>
            <div class='item-when'>Fr 24.04. ganztägig</div>
            <div class='item-who'>Arthur</div>
          </div>
          <div class='item-title'>Läusekontrolle in der Basisstufe</div>
          <div class='item-location'>Schule / Basisstufe</div>
        </div>
        
        <div class='item'>
          <div class='item-meta'>
            <div class='item-when'>Do 30.04. ganztägig</div>
            <div class='item-who'>Arthur</div>
          </div>
          <div class='item-title'>Wald*</div>
          <div class='item-location'>Schule / Basisstufe</div>
        </div>
        </div>
    </div>
    <div class='update'>Letztes Update 25.04. 04:05</div>
  </div>
</body>
</html>
